<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>熊猫UP主助手 - 协议与隐私</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --text: #1f2329;
      --muted: #667085;
      --line: #e6eaf2;
      --brand: #1769ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
        "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 36%, var(--bg) 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 880px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }

    .hero {
      padding: 32px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 12px 32px rgba(20, 30, 55, 0.06);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 34px;
      line-height: 1.2;
    }

    p {
      margin: 0;
      line-height: 1.75;
      color: var(--muted);
      font-size: 16px;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #cfd9ef;
      box-shadow: 0 12px 28px rgba(23, 105, 255, 0.08);
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #edf3ff;
      color: var(--brand);
      font-size: 13px;
      font-weight: 600;
    }

    .footer {
      margin-top: 24px;
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="badge">熊猫UP主助手 · 法律文件</div>
      <h1>协议与隐私说明</h1>
      <p>
        本页面用于公开展示《熊猫UP主助手》相关法律文件，供应用市场审核与用户查阅。
        如需联系应用运营者，请发送邮件至
        <a href="mailto:liubailing@skieer.com">liubailing@skieer.com</a>。
      </p>
    </section>

    <section class="links">
      <a class="card" href="./privacy.html">
        <div class="card-title">隐私政策</div>
        <p>说明应用收集、使用、存储及保护用户信息的规则，以及权限使用范围。</p>
      </a>

      <a class="card" href="./terms.html">
        <div class="card-title">用户协议</div>
        <p>说明服务使用规则、用户责任、内容合规要求及各方权利义务。</p>
      </a>
    </section>

    <div class="footer">最后更新时间：2026-04-19</div>
  </main>
</body>
</html>
